<!DOCTYPE html>
<html>
<head>
    <title>Academic Writing Tool</title>
</head>
<body>

    <h1>Academic Writing Tool</h1>

    <textarea id="text" placeholder="Enter your text here..." rows="6" cols="50"></textarea>
    <br><br>

    <button onclick="generateText()">Generate</button>

    <h3>Output:</h3>
    <div id="output"></div>

    <script>
    async function generateText() {
        const text = document.getElementById("text").value;

        const response = await fetch("/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        console.log(data);

        if (data.result) {
            document.getElementById("output").innerText = data.result;
        } else if (data.error) {
            document.getElementById("output").innerText = "Error: " + data.error;
        } else {
            document.getElementById("output").innerText = "No response from server";
        }
    }
    </script>

</body>
</html>
